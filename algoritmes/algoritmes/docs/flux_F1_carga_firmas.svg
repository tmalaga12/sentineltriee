<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900" font-family="Helvetica, Arial, sans-serif">
  <style>
    .start { fill:#10b981; stroke:#065f46; stroke-width:2; }
    .end { fill:#ef4444; stroke:#7f1d1d; stroke-width:2; }
    .proc { fill:#0f172a; stroke:#22d3ee; stroke-width:2; }
    .dec { fill:#0f172a; stroke:#f59e0b; stroke-width:2; }
    .io { fill:#0f172a; stroke:#a855f7; stroke-width:2; }
    .txt { fill:#f1f5f9; font-size:13px; text-anchor:middle; }
    .txt-sm { fill:#f1f5f9; font-size:11px; text-anchor:middle; }
    .lbl { fill:#94a3b8; font-size:11px; }
    .arrow { fill:none; stroke:#94a3b8; stroke-width:2; marker-end:url(#a1); }
    .title { fill:#22d3ee; font-size:20px; font-weight:bold; text-anchor:middle; }
    .sub { fill:#94a3b8; font-size:12px; text-anchor:middle; font-style:italic; }
  </style>
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="700" height="900" fill="#020617"/>
  <text x="350" y="35" class="title">F1 — Carga de Base de Datos</text>
  <text x="350" y="55" class="sub">GestorFirmas.cargar_desde_archivo(ruta) -> int</text>

  <!-- Start -->
  <ellipse class="start" cx="350" cy="100" rx="80" ry="22"/>
  <text x="350" y="105" class="txt">INICIO</text>

  <!-- IO: ruta -->
  <polygon class="io" points="240,150 460,150 440,200 220,200"/>
  <text x="335" y="180" class="txt">Recibir ruta archivo .db</text>

  <!-- Proc: verificar -->
  <rect class="proc" x="200" y="230" width="300" height="55" rx="6"/>
  <text x="350" y="252" class="txt">Verificar existencia archivo</text>
  <text x="350" y="270" class="txt-sm">Path(ruta).is_file()</text>

  <!-- Decision: existe? -->
  <polygon class="dec" points="350,310 480,365 350,420 220,365"/>
  <text x="350" y="370" class="txt">¿Existe?</text>

  <!-- End error -->
  <ellipse class="end" cx="600" cy="365" rx="70" ry="22"/>
  <text x="600" y="370" class="txt">FileNotFound</text>

  <!-- Proc: leer línea -->
  <rect class="proc" x="200" y="450" width="300" height="55" rx="6"/>
  <text x="350" y="472" class="txt">Leer línea N del archivo</text>
  <text x="350" y="490" class="txt-sm">enumerate(f, start=1)</text>

  <!-- Decision: comentario o vacía? -->
  <polygon class="dec" points="350,525 510,580 350,635 190,580"/>
  <text x="350" y="575" class="txt">¿Comentario</text>
  <text x="350" y="592" class="txt">o línea vacía?</text>

  <!-- Proc: parsear -->
  <rect class="proc" x="200" y="660" width="300" height="55" rx="6"/>
  <text x="350" y="682" class="txt">Parsear "nombre:HEX"</text>
  <text x="350" y="700" class="txt-sm">bytes.fromhex(...)</text>

  <!-- Proc: insertar Trie -->
  <rect class="proc" x="200" y="740" width="300" height="55" rx="6"/>
  <text x="350" y="762" class="txt">trie.insertar(firma, nombre)</text>
  <text x="350" y="780" class="txt-sm">recursión O(k) — k = longitud firma</text>

  <!-- Decision: more lines? -->
  <polygon class="dec" points="350,820 470,855 350,890 230,855"/>
  <text x="350" y="860" class="txt">¿Más líneas?</text>

  <!-- End OK -->
  <ellipse class="end" cx="600" cy="855" rx="70" ry="22" fill="#10b981" stroke="#065f46"/>
  <text x="600" y="860" class="txt">FIN (n cargadas)</text>

  <!-- Arrows -->
  <path class="arrow" d="M 350 122 L 350 150"/>
  <path class="arrow" d="M 350 200 L 350 230"/>
  <path class="arrow" d="M 350 285 L 350 310"/>
  <path class="arrow" d="M 480 365 L 530 365"/>
  <text x="495" y="358" class="lbl">No</text>
  <path class="arrow" d="M 350 420 L 350 450"/>
  <text x="360" y="438" class="lbl">Sí</text>
  <path class="arrow" d="M 350 505 L 350 525"/>
  <path class="arrow" d="M 510 580 C 580 580 580 700 500 700"/>
  <text x="565" y="640" class="lbl">Sí (skip)</text>
  <path class="arrow" d="M 350 635 L 350 660"/>
  <text x="360" y="650" class="lbl">No</text>
  <path class="arrow" d="M 350 715 L 350 740"/>
  <path class="arrow" d="M 350 795 L 350 820"/>
  <path class="arrow" d="M 230 855 C 150 855 150 472 200 472"/>
  <text x="115" y="660" class="lbl">Sí (loop)</text>
  <path class="arrow" d="M 470 855 L 530 855"/>
  <text x="495" y="848" class="lbl">No</text>
</svg>
